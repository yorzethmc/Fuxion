<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Showroom - Fusión Culinaria</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; overflow: hidden; margin: 0; transition: background 0.8s ease, color 0.8s ease; }
    
    /* Texturas Dinámicas del Visor */
    .bg-light-clean { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); color: #0f172a; }
    .bg-wood-rustic { background-color: #2c1e16; background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png'); color: #f8fafc; }
    .bg-dark-pro { background: linear-gradient(135deg, #0f172a 0%, #000000 100%); color: #f8fafc; }
    .bg-marble-luxury { background-color: #0c0c0c; background-image: url('https://www.transparenttextures.com/patterns/black-mamba.png'); color: #d4af37; }

    /* Mockup Celular */
    .phone-mockup {
      width: 375px;
      height: 812px;
      background: #000;
      border-radius: 40px;
      box-shadow: 0 40px 60px -15px rgba(0, 0, 0, 0.5), inset 0 0 0 12px #1f2937, inset 0 0 0 13px #374151;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: scale(0.9);
      transform-origin: center;
    }
    
    .phone-notch {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 30px;
      background: #1f2937;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
      z-index: 20;
    }

    .phone-screen {
      flex: 1;
      margin: 12px;
      margin-top: 12px;
      border-radius: 28px;
      overflow: hidden;
      background: #fff;
      position: relative;
      z-index: 10;
    }

    #loader { position: absolute; inset: 0; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s; }
    
    .glass-header {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body id="body-container" class="bg-light-clean flex flex-col h-screen">

  <!-- Pantalla de Carga -->
  <div id="loader">
    <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-orange-500 mb-4"></div>
    <h2 class="text-xl font-bold">Iniciando Servidores...</h2>
    <p class="text-gray-400 text-sm mt-2">Por favor espera unos segundos.</p>
  </div>

  <!-- Header Flotante -->
  <header class="glass-header w-full p-4 flex justify-between items-center z-50 absolute top-0 shadow-sm">
    <div class="flex items-center gap-3 pl-4">
      <div class="w-10 h-10 bg-gradient-to-tr from-orange-500 to-yellow-500 rounded-xl flex items-center justify-center font-bold text-white text-xl shadow-lg">FC</div>
      <div>
        <h1 class="font-bold text-lg leading-tight uppercase tracking-widest opacity-90">Fusión Culinaria</h1>
        <p class="text-[10px] uppercase tracking-[0.2em] opacity-60">Showroom Interactivo</p>
      </div>
    </div>
    
    <!-- Dropdown Selector de Modelos y Botón Abrir -->
    <div class="relative pr-4 flex items-center gap-4">
      <div class="relative">
        <select id="model-selector" onchange="changeModel(this.value)" class="appearance-none bg-black/20 border border-white/20 text-current backdrop-blur-md pl-4 pr-10 py-3 rounded-xl font-semibold cursor-pointer outline-none hover:bg-black/30 transition-colors shadow-lg">
          <optgroup label="Rango Económico (Estático)">
            <option value="r1a">Categoría A - Menú Básico</option>
            <option value="r1b">Categoría B - QR Pro</option>
            <option value="r1c">Categoría C - Autoadministrable</option>
          </optgroup>
          <optgroup label="Rango Profesional (Interactivos SPA)">
            <option value="r2a">Categoría A - Estético (Tabs)</option>
            <option value="r2b">Categoría B - Pre Pedido (Carrito WhatsApp)</option>
            <option value="r2c">Categoría C - Combo Marca (SEO)</option>
          </optgroup>
          <optgroup label="Rango Premium (Lujo)">
            <option value="r3a">Categoría A - Menú de Autor</option>
            <option value="r3b">Categoría B - E-commerce Gourmet</option>
            <option value="r3c">Categoría C - SaaS & Cloud Kitchen</option>
          </optgroup>
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-current opacity-50">▼</div>
      </div>
      <button onclick="openFullScreen()" class="bg-white/10 hover:bg-white/20 border border-white/20 text-current px-4 py-3 rounded-xl font-bold backdrop-blur-md transition-all shadow-lg flex items-center gap-2" title="Abrir en Pantalla Completa">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
        </svg>
        <span class="hidden sm:inline">Pantalla Completa</span>
      </button>
    </div>
  </header>

  <!-- Contenido Dividido: Info vs Mockup -->
  <main class="flex-1 flex flex-col lg:flex-row items-center justify-center pt-20 px-8 gap-12 lg:gap-24 h-full relative z-10">
    
    <!-- Lado Izquierdo: Funcionalidades del Modelo -->
    <div class="max-w-lg space-y-6 opacity-0 translate-y-4 transition-all duration-700 ease-out" id="info-panel">
      <span id="badge" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest border">RANGO 1</span>
      <h2 id="title" class="text-5xl font-black leading-tight drop-shadow-md">Menú Básico</h2>
      <p id="desc" class="text-lg opacity-80 leading-relaxed font-light">La pizarra digital perfecta para dar el salto desde el menú de papel hacia el mundo digital.</p>
      
      <div class="pt-6 border-t border-current border-opacity-20">
        <h3 class="text-sm uppercase tracking-widest font-bold mb-4 opacity-70">Funcionalidades Incluidas:</h3>
        <ul id="features" class="space-y-3">
          <!-- Features inyectados por JS -->
        </ul>
      </div>
    </div>

    <!-- Lado Derecho: Celular -->
    <div class="phone-mockup shadow-2xl">
      <div class="phone-notch"></div>
      <div class="phone-screen bg-black">
        <iframe id="viewer" src="about:blank" class="w-full h-full border-0 bg-white transition-opacity duration-500"></iframe>
      </div>
    </div>

  </main>

  <script>
    const modelsData = {
      "r1a": {
        url: "RANGO_1_ECONOMICO/CATEGORIA_A_BASICO/index.html",
        badge: "Económico",
        title: "Pizarra Digital Básica",
        desc: "Ideal para presupuestos ajustados. Olvídate del PDF, presenta tus platillos de manera limpia y moderna en cualquier dispositivo.",
        features: [
          "Diseño Adaptativo (Mobile-First)",
          "Botón de contacto directo por WhatsApp",
          "Experiencia de lectura rápida (1 sola vista)"
        ],
        theme: "bg-light-clean"
      },
      "r1b": {
        url: "RANGO_1_ECONOMICO/CATEGORIA_B_QR_PRO/index.html",
        badge: "Económico",
        title: "Experiencia QR Pro",
        desc: "Lleva tráfico a tu restaurante físico añadiendo mapas e indicaciones con un solo toque.",
        features: [
          "Diseño Rústico de Pizarra (Textura madera)",
          "Botones integrados de Waze y Google Maps",
          "Insignias visuales (Nuevo, Recomendado)"
        ],
        theme: "bg-wood-rustic"
      },
      "r1c": {
        url: "RANGO_1_ECONOMICO/CATEGORIA_C_AUTOADMINISTRABLE_MANUAL/index.html",
        badge: "Económico",
        title: "Autoadministrable Dinámico",
        desc: "Para negocios con precios variables. Actualiza tus platillos sin tener que rediseñar la página.",
        features: [
          "Consumo dinámico de JSON",
          "Sección de Ofertas del Día",
          "Mismo diseño rústico de alta conversión"
        ],
        theme: "bg-wood-rustic"
      },
      "r2a": {
        url: "RANGO_2_PROFESIONAL/CATEGORIA_A_ESTETICO/index.html",
        badge: "Profesional",
        title: "Aplicación SPA - Estético",
        desc: "Navegación instantánea. Si tienes un menú gigante, tus clientes pueden saltar entre categorías sin que la pantalla recargue.",
        features: [
          "Arquitectura React (Single Page App)",
          "Pestañas de navegación interactivas",
          "Estética oscura y moderna (Dark Mode)"
        ],
        theme: "bg-dark-pro"
      },
      "r2b": {
        url: "RANGO_2_PROFESIONAL/CATEGORIA_B_PRE_PEDIDO_WHATSAPP/index.html",
        badge: "Profesional",
        title: "Motor de Pre-Pedido",
        desc: "Nuestra solución Best-Seller. Convierte tu menú en un cajero automático y ahorra errores humanos en el Delivery.",
        features: [
          "🛒 Carrito de Compras en tiempo real",
          "Selección de opciones y extras con recargo",
          "Formateo inteligente del pedido por WhatsApp"
        ],
        theme: "bg-dark-pro"
      },
      "r2c": {
        url: "RANGO_2_PROFESIONAL/CATEGORIA_C_COMBO_MARCA/index.html",
        badge: "Profesional",
        title: "Combo Marca (SEO)",
        desc: "Para restaurantes que invierten en publicidad. Incluye todo el poder del Pre-Pedido, más una indexación impecable para redes.",
        features: [
          "🛒 Motor de Pre-Pedido Completo",
          "Metadatos SEO Inyectados para Google",
          "Previsualización rica en enlaces (Open Graph)"
        ],
        theme: "bg-dark-pro"
      },
      "r3a": {
        url: "RANGO_3_PREMIUM/CATEGORIA_A_AUTOR/index.html",
        badge: "Premium Lujo 1",
        title: "Experiencia de Autor",
        desc: "Un menú que justifica tickets altos. Vende emociones y exclusividad antes del primer bocado.",
        features: [
          "✨ Diseño Editorial Asimétrico",
          "Micro-animaciones fluidas e inmersivas",
          "Tipografías finas y Efecto Glassmorphism",
          "El fondo del celular evoca un restaurante de lujo"
        ],
        theme: "bg-marble-luxury"
      },
      "r3b": {
        url: "RANGO_3_PREMIUM/CATEGORIA_B_ECOMMERCE_GOURMET/index.html",
        badge: "Premium Lujo 2",
        title: "E-commerce Gourmet",
        desc: "Experiencia de Autor + Logística. Checkout avanzado para dominar el Delivery y Takeaway con precisión milimétrica.",
        features: [
          "🛒 Personalización Quirúrgica (Sin Cebolla)",
          "Selector Inteligente (Local, Llevar, Express)",
          "Lógica de Pago (Cálculo de vuelto de efectivo)",
          "Comanda Profesional (Agrupada y sin emojis)"
        ],
        theme: "bg-marble-luxury"
      },
      "r3c": {
        url: "RANGO_3_PREMIUM/CATEGORIA_C_SAAS_CLOUD_KITCHEN/index.html",
        badge: "SaaS Enterprise",
        title: "Cloud Kitchen & POS",
        desc: "El Santo Grial. Panel administrativo propio, bases de datos en la nube y recepción de comandas en cocina (Sin usar WhatsApp).",
        features: [
          "☁️ Base de Datos Serverless (Firebase)",
          "Panel Administrativo: Editar Precios y Stock",
          "KDS en Tiempo Real (Pantalla de Cocina)",
          "🛎️ Impresión de Comandas Térmicas (80mm)"
        ],
        theme: "bg-marble-luxury"
      }
    };

    function changeModel(modelKey) {
      const data = modelsData[modelKey];
      if(!data) return;

      // 1. Cambiar Tema de Fondo Global
      const body = document.getElementById('body-container');
      body.className = `${data.theme} flex flex-col h-screen`;

      // 2. Animar Panel de Info
      const panel = document.getElementById('info-panel');
      panel.style.opacity = '0';
      panel.style.transform = 'translateY(20px)';

      setTimeout(() => {
        document.getElementById('badge').textContent = data.badge;
        
        // Estilo especial para la tarjeta premium
        if(data.theme === 'bg-marble-luxury') {
          document.getElementById('title').className = "text-5xl leading-tight drop-shadow-md font-serif italic";
        } else {
          document.getElementById('title').className = "text-5xl font-black leading-tight drop-shadow-md";
        }

        document.getElementById('title').textContent = data.title;
        document.getElementById('desc').textContent = data.desc;
        
        const featuresHtml = data.features.map(f => `<li class="flex items-center gap-2"><span class="opacity-50">✓</span> <span class="font-semibold">${f}</span></li>`).join('');
        document.getElementById('features').innerHTML = featuresHtml;

        panel.style.opacity = '1';
        panel.style.transform = 'translateY(0)';
      }, 300);

      // 3. Cargar Iframe
      const iframe = document.getElementById('viewer');
      iframe.style.opacity = '0';
      setTimeout(() => {
        iframe.src = data.url;
        iframe.onload = () => { iframe.style.opacity = '1'; };
      }, 300);
    }

    function openFullScreen() {
      const modelKey = document.getElementById('model-selector').value;
      const data = modelsData[modelKey];
      if(data) {
        window.open(data.url, '_blank');
      }
    }

    // Ocultar loader despues de 8 segundos (asumiendo que los servidores arrancan)
    setTimeout(() => {
      document.getElementById('loader').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        changeModel('r1a');
        document.getElementById('info-panel').style.opacity = '1';
        document.getElementById('info-panel').style.transform = 'translateY(0)';
      }, 500);
    }, 8000);
  </script>
</body>
</html>
