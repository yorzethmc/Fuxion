name: Deploy Visor to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Rango 2 - Categoría A
        working-directory: ./RANGO_2_PROFESIONAL/CATEGORIA_A_ESTETICO
        run: npm install --legacy-peer-deps && npm run build

      - name: Build Rango 2 - Categoría B
        working-directory: ./RANGO_2_PROFESIONAL/CATEGORIA_B_PRE_PEDIDO_WHATSAPP
        run: npm install --legacy-peer-deps && npm run build

      - name: Build Rango 2 - Categoría C
        working-directory: ./RANGO_2_PROFESIONAL/CATEGORIA_C_COMBO_MARCA
        run: npm install --legacy-peer-deps && npm run build

      - name: Build Rango 3 - Categoría A
        working-directory: ./RANGO_3_PREMIUM/CATEGORIA_A_AUTOR
        run: npm install --legacy-peer-deps && npm run build

      - name: Build Rango 3 - Categoría B
        working-directory: ./RANGO_3_PREMIUM/CATEGORIA_B_ECOMMERCE_GOURMET
        run: npm install --legacy-peer-deps && npm run build

      - name: Build Rango 3 - Categoría C
        working-directory: ./RANGO_3_PREMIUM/CATEGORIA_C_SAAS_CLOUD_KITCHEN
        run: npm install --legacy-peer-deps && npm run build

      - name: Assemble Static Site
        run: |
          mkdir -p public_html

          # ---- Rango 1 (Static HTML) ----
          mkdir -p public_html/RANGO_1_ECONOMICO/CATEGORIA_A_BASICO
          cp -r RANGO_1_ECONOMICO/CATEGORIA_A_BASICO/* public_html/RANGO_1_ECONOMICO/CATEGORIA_A_BASICO/

          mkdir -p public_html/RANGO_1_ECONOMICO/CATEGORIA_B_QR_PRO
          cp -r RANGO_1_ECONOMICO/CATEGORIA_B_QR_PRO/* public_html/RANGO_1_ECONOMICO/CATEGORIA_B_QR_PRO/

          mkdir -p public_html/RANGO_1_ECONOMICO/CATEGORIA_C_AUTOADMINISTRABLE_MANUAL
          cp -r RANGO_1_ECONOMICO/CATEGORIA_C_AUTOADMINISTRABLE_MANUAL/* public_html/RANGO_1_ECONOMICO/CATEGORIA_C_AUTOADMINISTRABLE_MANUAL/

          # ---- Rango 2 (React dist) ----
          mkdir -p public_html/RANGO_2_PROFESIONAL/CATEGORIA_A_ESTETICO
          cp -r RANGO_2_PROFESIONAL/CATEGORIA_A_ESTETICO/dist/* public_html/RANGO_2_PROFESIONAL/CATEGORIA_A_ESTETICO/

          mkdir -p public_html/RANGO_2_PROFESIONAL/CATEGORIA_B_PRE_PEDIDO_WHATSAPP
          cp -r RANGO_2_PROFESIONAL/CATEGORIA_B_PRE_PEDIDO_WHATSAPP/dist/* public_html/RANGO_2_PROFESIONAL/CATEGORIA_B_PRE_PEDIDO_WHATSAPP/

          mkdir -p public_html/RANGO_2_PROFESIONAL/CATEGORIA_C_COMBO_MARCA
          cp -r RANGO_2_PROFESIONAL/CATEGORIA_C_COMBO_MARCA/dist/* public_html/RANGO_2_PROFESIONAL/CATEGORIA_C_COMBO_MARCA/

          # ---- Rango 3 (React dist) ----
          mkdir -p public_html/RANGO_3_PREMIUM/CATEGORIA_A_AUTOR
          cp -r RANGO_3_PREMIUM/CATEGORIA_A_AUTOR/dist/* public_html/RANGO_3_PREMIUM/CATEGORIA_A_AUTOR/

          mkdir -p public_html/RANGO_3_PREMIUM/CATEGORIA_B_ECOMMERCE_GOURMET
          cp -r RANGO_3_PREMIUM/CATEGORIA_B_ECOMMERCE_GOURMET/dist/* public_html/RANGO_3_PREMIUM/CATEGORIA_B_ECOMMERCE_GOURMET/

          mkdir -p public_html/RANGO_3_PREMIUM/CATEGORIA_C_SAAS_CLOUD_KITCHEN
          cp -r RANGO_3_PREMIUM/CATEGORIA_C_SAAS_CLOUD_KITCHEN/dist/* public_html/RANGO_3_PREMIUM/CATEGORIA_C_SAAS_CLOUD_KITCHEN/

          # ---- Copy docs (shared assets like logo) ----
          mkdir -p public_html/docs
          cp -r docs/* public_html/docs/ 2>/dev/null || true

          # ---- Build visor.html for static hosting ----
          cat visor.html | \
            sed 's|http://localhost:8081|RANGO_1_ECONOMICO/CATEGORIA_A_BASICO/index.html|g' | \
            sed 's|http://localhost:8082|RANGO_1_ECONOMICO/CATEGORIA_B_QR_PRO/index.html|g' | \
            sed 's|http://localhost:8083|RANGO_1_ECONOMICO/CATEGORIA_C_AUTOADMINISTRABLE_MANUAL/index.html|g' | \
            sed 's|http://localhost:8084|RANGO_2_PROFESIONAL/CATEGORIA_A_ESTETICO/index.html|g' | \
            sed 's|http://localhost:8085|RANGO_2_PROFESIONAL/CATEGORIA_B_PRE_PEDIDO_WHATSAPP/index.html|g' | \
            sed 's|http://localhost:8086|RANGO_2_PROFESIONAL/CATEGORIA_C_COMBO_MARCA/index.html|g' | \
            sed 's|http://localhost:8087|RANGO_3_PREMIUM/CATEGORIA_A_AUTOR/index.html|g' | \
            sed 's|http://localhost:8088|RANGO_3_PREMIUM/CATEGORIA_B_ECOMMERCE_GOURMET/index.html|g' | \
            sed 's|http://localhost:8089|RANGO_3_PREMIUM/CATEGORIA_C_SAAS_CLOUD_KITCHEN/index.html|g' > public_html/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public_html
